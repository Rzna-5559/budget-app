<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Budget App - Personal budget management application">
    <title>预算管理应用 | Budget App</title>
    <link href="./style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <div class="budget-container" role="main" aria-label="Budget application main content">
      <div class="app-title">
        <a href="">预算<b>应用</b></a>
        <div class="lang-switch" role="navigation" aria-label="Language selection">
          <select id="lang-select" aria-label="Select language">
            <option value="zh" selected>中文</option>
            <option value="en">English</option>
          </select>
        </div>
      </div>
      <div class="budget-header" role="region" aria-label="Budget summary">
        <div class="balance">
          <div class="title" role="heading" aria-level="2">余额</div>
          <div class="value" role="status" aria-live="polite"><small>$</small>0</div>
        </div>
        <div class="account">
          <div class="income" role="region" aria-label="Income">
            <div class="title" role="heading" aria-level="3">收入</div>
            <div class="income-total"><small>$</small>0</div>
          </div>
          <div class="chart" role="img" aria-label="Budget chart"></div>
          <div class="outcome" role="region" aria-label="Expense">
            <div class="title" role="heading" aria-level="3">支出</div>
            <div class="outcome-total"><small>$</small>0</div>
          </div>
        </div>
      </div>
      <div class="budget-dashboard" role="region" aria-label="Dashboard">
        <div class="dash-title" role="heading" aria-level="2">仪表盘</div>
        <div class="toggle" role="tablist" aria-label="Transaction type filter">
          <button class="first-tab" role="tab" aria-selected="false" aria-controls="expense" tabindex="0">支出</button>
          <button class="second-tab" role="tab" aria-selected="false" aria-controls="income" tabindex="-1">收入</button>
          <button class="third-tab focus" role="tab" aria-selected="true" aria-controls="all" tabindex="0">全部</button>
        </div>
        <div class="hide" id="expense" role="tabpanel" aria-labelledby="expense-tab">
          <ul class="list" role="list" aria-label="Expense list"></ul>
          <div class="input" role="group" aria-label="Add expense form">
            <input
              type="text"
              id="expense-title-input"
              name="title"
              placeholder="标题"
              aria-label="Expense title"
            />
            <input
              type="number"
              id="expense-amount-input"
              name="amount"
              placeholder="$0"
              aria-label="Expense amount"
              min="0"
            />
            <button class="add-expense" aria-label="Add expense" role="button" tabindex="0">
              <img src="icon/plus.png" alt="+" />
            </button>
          </div>
        </div>
        <div class="hide" id="income" role="tabpanel" aria-labelledby="income-tab">
          <ul class="list" role="list" aria-label="Income list"></ul>
          <div class="input" role="group" aria-label="Add income form">
            <input
              type="text"
              id="income-title-input"
              name="title"
              placeholder="标题"
              aria-label="Income title"
            />
            <input
              type="number"
              id="income-amount-input"
              name="amount"
              placeholder="$0"
              aria-label="Income amount"
              min="0"
            />
            <button class="add-income" aria-label="Add income" role="button" tabindex="0">
              <img src="icon/plus.png" alt="+" />
            </button>
          </div>
        </div>
        <div id="all" role="tabpanel" aria-labelledby="all-tab">
          <ul class="list" role="list" aria-label="All transactions list"></ul>
        </div>
      </div>
    </div>

    <!-- Cookie Banner -->
    <div id="cookie-banner" class="cookie-banner" role="dialog" aria-label="Cookie consent" style="display: none;">
      <p class="cookie-text">我们使用Cookie来改善您的体验。</p>
      <button onclick="acceptCookies()" class="cookie-accept" aria-label="Accept cookies">同意</button>
      <a href="./privacy.html" class="privacy-link" aria-label="View privacy policy">隐私政策</a>
    </div>

    <footer role="contentinfo">
      <a href="./privacy.html" aria-label="Privacy Policy page">隐私政策</a>
    </footer>

    <script src="./chart.js"></script>
    <script src="./budget.js"></script>
  </body>
</html>
